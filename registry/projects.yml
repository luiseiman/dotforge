# Registry of projects managed by claude-kit
# Updated by /forge audit and /forge sync
# Schema: name, path, stacks, last_audit, last_sync, claude_kit_version, score, history, metrics_summary, notes
# Scoring v2.3.0: score = obligatorio*0.7 + recomendado*(3.0/7) (max 10.0)
# history: array of {date, score, version} entries — appended by /forge audit, never overwritten
# metrics_summary: aggregated session metrics — updated by /forge insights from ~/.claude/metrics/{slug}/
#
# This file ships empty. /forge bootstrap and /forge audit populate it with your projects.
# Your local registry is gitignored after first use — see .gitignore.
#
# Example entry:
#
# projects:
#   - name: my-api
#     path: /home/user/projects/my-api
#     stacks: [python-fastapi, docker-deploy]
#     last_audit: 2026-03-19
#     last_sync: 2026-03-19
#     claude_kit_version: 2.3.0
#     score: 9.5
#     history:
#       - {date: 2026-03-01, score: 7.0, version: 1.0.0}
#       - {date: 2026-03-19, score: 9.5, version: 2.3.0}
#     metrics_summary:
#       sessions: 15
#       avg_errors: 0.3
#       avg_hook_blocks: 0.8
#       avg_rule_coverage: 0.72
#       last_updated: 2026-03-19
#     notes: "8 rules, 2 hooks, 4 commands, deny complete."

projects: []
